# version: "3.3"

#services describe the containers that will start
services:
  db:
    container_name: postgres
    image: "postgres:16"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=local
      - POSTGRES_PASSWORD=local
      - POSTGRES_DB=cric_op
#networks:
#  api.network:
volumes:
  postgres_data: